<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#f2f1ee"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Wordmark con guías -->
  <!-- Línea base superior LUIS -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="rgba(180,60,40,0.3)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Línea base LUIS -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="rgba(180,60,40,0.3)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Línea base ARNAU -->
  <line x1="80" y1="490" x2="720" y2="490" stroke="rgba(180,60,40,0.3)" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Wordmark -->
  <text x="80" y="340" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="148" fill="#0a0a0a" letter-spacing="-5">LUIS</text>
  <text x="80" y="490" font-family="system-ui,-apple-system,sans-serif" font-weight="300" font-size="148" fill="#0a0a0a" letter-spacing="-5" opacity="0.5">ARNAU</text>

  <!-- Anotaciones -->
  <text x="740" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(180,60,40,0.8)" letter-spacing="2">Cap height</text>
  <text x="740" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(180,60,40,0.8)" letter-spacing="2">Baseline</text>
  <text x="740" y="500" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(180,60,40,0.8)" letter-spacing="2">Baseline</text>

  <!-- Panel derecho -->
  <text x="820" y="240" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="20" fill="#0a0a0a" letter-spacing="2">CONSTRUCCIÓN</text>
  <line x1="820" y1="256" x2="1120" y2="256" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
  <text x="820" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="rgba(0,0,0,0.4)" letter-spacing="3">TIPOGRAFÍA</text>
  <text x="820" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#0a0a0a">Inter Variable</text>
  <text x="820" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="rgba(0,0,0,0.4)" letter-spacing="3">PESO SUPERIOR</text>
  <text x="820" y="386" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="15" fill="#0a0a0a">900 Black</text>
  <text x="820" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="rgba(0,0,0,0.4)" letter-spacing="3">PESO INFERIOR</text>
  <text x="820" y="456" font-family="system-ui,-apple-system,sans-serif" font-weight="300" font-size="15" fill="#0a0a0a">300 Light</text>
  <text x="820" y="500" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="rgba(0,0,0,0.4)" letter-spacing="3">CONTRASTE DE PESO</text>
  <text x="820" y="526" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#0a0a0a">El nombre llama. El apellido sostiene.</text>
</svg>
