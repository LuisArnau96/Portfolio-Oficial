<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#f2f1ee"/>

  <!-- Grid dots -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="rgba(0,0,0,0.1)"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Construction lines (dashed) -->
  <!-- Baseline at top (y=228 in mark coords) -->
  <line x1="100" y1="228" x2="550" y2="228" stroke="rgba(180,60,40,0.35)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Baseline at bottom (y=448) -->
  <line x1="100" y1="448" x2="550" y2="448" stroke="rgba(180,60,40,0.35)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Vertical guide at x=190 -->
  <line x1="190" y1="160" x2="190" y2="520" stroke="rgba(180,60,40,0.35)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Circle center cross -->
  <line x1="160" y1="308" x2="400" y2="308" stroke="rgba(180,60,40,0.35)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Radius line -->
  <line x1="270" y1="308" x2="350" y2="308" stroke="rgba(180,60,40,0.6)" stroke-width="1.5"/>
  <!-- Tangent point marker -->
  <circle cx="190" cy="308" r="5" fill="none" stroke="rgba(180,60,40,0.7)" stroke-width="1.5"/>

  <!-- Center dot of circle -->
  <circle cx="270" cy="308" r="4" fill="rgba(180,60,40,0.7)"/>

  <!-- The actual mark -->
  <circle cx="270" cy="308" r="80" stroke="#0a0a0a" stroke-width="22" fill="none"/>
  <line x1="190" y1="228" x2="190" y2="448" stroke="#0a0a0a" stroke-width="22" stroke-linecap="round"/>
  <line x1="190" y1="448" x2="280" y2="448" stroke="#0a0a0a" stroke-width="22" stroke-linecap="round"/>

  <!-- Annotations -->
  <text x="270" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(180,60,40,0.8)" text-anchor="middle" letter-spacing="2">Ø 160u</text>
  <text x="310" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(180,60,40,0.8)" letter-spacing="1">80u</text>
  <text x="112" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(180,60,40,0.8)" text-anchor="middle" letter-spacing="1">Tg.</text>

  <!-- Right side: label block -->
  <text x="660" y="240" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="28" fill="#0a0a0a" letter-spacing="2">CONSTRUCCIÓN</text>
  <line x1="660" y1="258" x2="1100" y2="258" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <text x="660" y="300" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="12" fill="rgba(0,0,0,0.4)" letter-spacing="4">ELEMENTOS</text>
  <text x="660" y="324" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="15" fill="#0a0a0a">① Círculo  —  forma primaria Bauhaus</text>
  <text x="660" y="348" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="15" fill="#0a0a0a">② Línea vertical tangente al círculo</text>
  <text x="660" y="372" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="15" fill="#0a0a0a">③ Base horizontal  —  pie de la L</text>

  <line x1="660" y1="398" x2="1100" y2="398" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
  <text x="660" y="422" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="12" fill="rgba(0,0,0,0.4)" letter-spacing="4">PRINCIPIO</text>
  <text x="660" y="446" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="15" fill="#0a0a0a" textLength="400">El tope del trazo y el tope del círculo</text>
  <text x="660" y="466" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="15" fill="#0a0a0a">comparten la misma altura. Orden interno.</text>
</svg>
