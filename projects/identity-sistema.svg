<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <!-- Fondo oscuro izquierda -->
  <rect width="600" height="675" fill="#0a0a0a"/>
  <!-- Fondo claro derecha -->
  <rect x="600" width="600" height="675" fill="#f2f1ee"/>

  <!-- Wordmark sobre oscuro -->
  <text x="60" y="310" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="100" fill="#f8f7f4" letter-spacing="-4">LUIS</text>
  <text x="60" y="420" font-family="system-ui,-apple-system,sans-serif" font-weight="300" font-size="100" fill="#f8f7f4" letter-spacing="-4" opacity="0.55">ARNAU</text>
  <text x="60" y="530" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(248,247,244,0.25)" letter-spacing="4">VERSIÓN OSCURA</text>

  <!-- Wordmark sobre claro -->
  <text x="660" y="310" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="100" fill="#0a0a0a" letter-spacing="-4">LUIS</text>
  <text x="660" y="420" font-family="system-ui,-apple-system,sans-serif" font-weight="300" font-size="100" fill="#0a0a0a" letter-spacing="-4" opacity="0.45">ARNAU</text>
  <text x="660" y="530" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(0,0,0,0.25)" letter-spacing="4">VERSIÓN CLARA</text>

  <!-- Divider -->
  <line x1="600" y1="0" x2="600" y2="675" stroke="rgba(128,128,128,0.15)" stroke-width="1"/>
</svg>
