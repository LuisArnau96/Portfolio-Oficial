<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <!-- Left half: dark -->
  <rect width="600" height="675" fill="#0a0a0a"/>
  <!-- Right half: light -->
  <rect x="600" width="600" height="675" fill="#f2f1ee"/>

  <!-- Mark on dark (white) — centered in left half, scale 7x -->
  <!-- Circle cx=150, cy=280, r=56 · Vertical x=94 y=196→336 · Base x=94→157 y=336 -->
  <circle cx="300" cy="300" r="70" stroke="#f8f7f4" stroke-width="16" fill="none"/>
  <line x1="230" y1="230" x2="230" y2="440" stroke="#f8f7f4" stroke-width="16" stroke-linecap="round"/>
  <line x1="230" y1="440" x2="300" y2="440" stroke="#f8f7f4" stroke-width="16" stroke-linecap="round"/>

  <!-- Label dark -->
  <text x="300" y="530" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="11" fill="rgba(248,247,244,0.35)" text-anchor="middle" letter-spacing="4">VERSIÓN OSCURA</text>

  <!-- Mark on light (dark) — centered in right half -->
  <circle cx="900" cy="300" r="70" stroke="#0a0a0a" stroke-width="16" fill="none"/>
  <line x1="830" y1="230" x2="830" y2="440" stroke="#0a0a0a" stroke-width="16" stroke-linecap="round"/>
  <line x1="830" y1="440" x2="900" y2="440" stroke="#0a0a0a" stroke-width="16" stroke-linecap="round"/>

  <!-- Label light -->
  <text x="900" y="530" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="11" fill="rgba(0,0,0,0.3)" text-anchor="middle" letter-spacing="4">VERSIÓN CLARA</text>

  <!-- Divider line -->
  <line x1="600" y1="0" x2="600" y2="675" stroke="rgba(128,128,128,0.2)" stroke-width="1"/>
</svg>
